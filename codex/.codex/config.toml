approval_policy = "on-request"
sandbox_mode = "danger-full-access"
network_access = true
suppress_unstable_features_warning = true
web_search = "live"
allow_login_shell = true

[shell_environment_policy]
inherit = "all"
[projects."/Users/azhou@column.com"]
trust_level = "trusted"

[projects."/Users/azhou@column.com/column-ai-marketplace"]
trust_level = "trusted"

[projects."/Users/azhou@column.com/dotfiles"]
trust_level = "trusted"

[tui]
status_line = ["model-with-reasoning", "context-remaining", "current-dir", "git-branch"]
